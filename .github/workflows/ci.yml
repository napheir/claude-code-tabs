name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  parse:
    name: Parse PowerShell scripts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run parse check
        shell: powershell
        run: ./tests/parse.ps1

  smoke:
    name: Smoke test (synthetic stdin)
    runs-on: windows-latest
    needs: parse
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke test
        shell: powershell
        run: ./tests/smoke.ps1

  install-dryrun:
    name: install.ps1 -DryRun
    runs-on: windows-latest
    needs: parse
    steps:
      - uses: actions/checkout@v4

      - name: Verify installer dry-run is clean
        shell: powershell
        run: ./install.ps1 -DryRun

  install-smoke:
    name: Install smoke (Register-Hooks against temp settings.json)
    runs-on: windows-latest
    needs: parse
    steps:
      - uses: actions/checkout@v4

      - name: Run install smoke test
        shell: powershell
        run: ./tests/smoke-install.ps1
